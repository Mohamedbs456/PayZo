services:

  # Dev overrides for backend:
  # - Remote debug on port 5005 (attach from IDE)
  # - Maven .m2 cache bind-mounted to avoid re-downloading on every rebuild
  backend:
    environment:
      JAVA_TOOL_OPTIONS: >-
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
    ports:
      - "5005:5005"
    volumes:
      - ${USERPROFILE:-.}/.m2:/root/.m2:ro

  # Dev override for the CBS simulator: persist cbs_db across restarts instead of
  # the production default ddl-auto=create. This keeps the SQL-seeded backoffice
  # demo clients (Backend/seed_dev_cbs.sql) alive after a `docker compose up`,
  # which is required so the backoffice fraud-alert approve flow (which executes a
  # real CBS transfer) works for the seeded clients. DataInitializer stays
  # idempotent (it guards on clientRepository.count()), so it won't re-seed.
  cbs-simulator:
    environment:
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

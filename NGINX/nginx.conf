worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Allow profile picture uploads (5 MB)
    client_max_body_size 5m;

    # Gzip for JS / CSS / JSON payloads
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    upstream backend {
        server backend:8081;
        keepalive 16;
    }

    upstream client-fe {
        server client-web-app:80;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options            "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options     "nosniff"                         always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection           "1; mode=block"                   always;

        # Content-Security-Policy — defense-in-depth XSS mitigation.
        # connect-src must list every cross-origin endpoint the SPA reaches
        # directly from the browser. Today that's only Keycloak (backend API
        # is same-origin via /api/ below). When deploying behind a different
        # Keycloak host, update this AND `VITE_KEYCLOAK_URL` together — the
        # two must agree or login silently fails CSP.
        # style-src 'unsafe-inline' is needed because Tailwind v4 + CVA emit
        # dynamic class hashes via inline <style> blocks at render time.
        # script-src stays strict — Vite emits external bundles, no inline.
        # img-src data: blob: covers Lucide SVG sprites + future profile-pic
        # preview (URL.createObjectURL). frame-ancestors 'none' complements
        # X-Frame-Options (which modern browsers may defer to CSP for).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' http://localhost:8080 http://keycloak:8080; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

        # Backend API — preserves /api/v1/... path
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Actuator health — reachable via Nginx for reverse-proxy setups
        location = /actuator/health {
            proxy_pass         http://backend/actuator/health;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_read_timeout 5s;
        }

        # Client frontend — catch-all
        location / {
            proxy_pass         http://client-fe;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}

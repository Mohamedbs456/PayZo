# Production profile: in-cluster service names, Hibernate validate, SQL logging off, secrets injected via env vars.
spring:
  datasource:
    url: jdbc:postgresql://postgres-db:5432/payzo_db
    username: payzo_user
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:8080/realms/clients

otp:
  delivery:
    enabled: true

uploads:
  path: /app/uploads

logging:
  level:
    com.payzo: INFO
    root: WARN
